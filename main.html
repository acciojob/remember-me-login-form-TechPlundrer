	<h1>Login Form</h1>

<form id="loginForm">

  <label for="username">Username</label>

  <br /><br />

  <label for="password">Password</label>

  <br /><br />

  <input type="checkbox" id="checkbox" />

  <br /><br />

  <input type="submit" id="submit" value="Submit" />
</form>

<br />

<button id="existing" style="display: none;">
  Login as existing user
</button>
